<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Eclipse Face v7</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Fondo -->

<div id="background">

    <div id="backgroundGlow"></div>

    <div id="particles"></div>

</div>

<!-- Contenedor Principal -->

<div id="mainContainer">

    <!-- Marco Exterior -->

    <div id="frame">

        <!-- Pantalla -->

        <div id="screen">

            <!-- Cara -->

            <div id="face">

                <!-- CEJAS -->

                <div id="leftBrow" class="brow"></div>

                <div id="rightBrow" class="brow"></div>

                <!-- OJOS -->

                <div id="leftEye"
                class="eye"></div>

                <div id="rightEye"
                class="eye"></div>

                <!-- PÁRPADOS -->

                <div id="leftLid"
                class="lid"></div>

                <div id="rightLid"
                class="lid"></div>

                <!-- PUPILAS -->

                <div id="leftPupil"
                class="pupil"></div>

                <div id="rightPupil"
                class="pupil"></div>

                <!-- BRILLO -->

                <div id="leftShine"
                class="shine"></div>

                <div id="rightShine"
                class="shine"></div>

                <!-- BOCA -->

                <div id="mouth"></div>

                <!-- LÁGRIMA -->

                <div id="tear"></div>

                <!-- MEJILLAS -->

                <div id="leftCheek"
                class="cheek"></div>

                <div id="rightCheek"
                class="cheek"></div>

                <!-- CORAZONES -->

                <div id="heartLeft"
                class="heart"></div>

                <div id="heartRight"
                class="heart"></div>

                <!-- ESTRELLAS -->

                <div id="starLeft"
                class="star"></div>

                <div id="starRight"
                class="star"></div>

                <!-- ESPIRALES -->

                <div id="spiralLeft"
                class="spiral"></div>

                <div id="spiralRight"
                class="spiral"></div>

                <!-- PROCESANDO -->

                <div id="processing">

                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Audio (para sincronizar la boca) -->

<audio id="voiceAudio"></audio>

<!-- Scripts -->

<script src="config.js"></script>

<script src="script.js"></script>

<script src="effects.js"></script>

<script src="expressions.js"></script>

<script src="brain.js"></script>

<script src="ai.js"></script>

<script src="vision.js"></script>

<script src="api.js"></script>

</body>

</html>
